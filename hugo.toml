baseURL = "https://isseeeeey55.github.io/tech-pulse/"
relativeURLs = true
languageCode = "ja"
title = "Tech Pulse"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  ShareButtons = ["x", "facebook", "telegram"]
  description = "AWS & Claude Code の最新アップデートをお届けする技術ブログ"
  author = "Tech Pulse"

  [params.homeInfoParams]
    Title = "Tech Pulse"
    Content = "![Tech Pulse](images/hero.png)\n\nAWS と Claude Code の最新アップデートを、SRE視点でわかりやすく解説します。"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false

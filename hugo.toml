baseURL = "https://isseeeeey55.github.io/tech-pulse/"
languageCode = "ja"
title = "Tech Pulse"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  ShareButtons = ["x", "facebook", "telegram"]
  description = "AWS・Claude Code・New Relic の最新アップデートをお届けする技術ブログ"
  author = "Tech Pulse"

  [params.homeInfoParams]
    Title = "Tech Pulse"
    Content = "![Tech Pulse](/tech-pulse/images/hero.png)\n\nAWS、Claude Code、New Relic の最新アップデートを、SRE視点でわかりやすく解説する技術ブログです。\n\n毎日のアップデート情報を自動収集し、注目ポイントの深掘り・コード例・活用Tipsをまとめてお届けします。インフラエンジニア・SREの日々のキャッチアップにご活用ください。"


[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "rss"
    name = "RSS"
    url = "/index.xml"
    weight = 50

[services]
  [services.googleAnalytics]
    id = "G-DBZETGP0QY"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
